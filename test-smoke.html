<!DOCTYPE html>
<html lang="pl">
<head><meta charset="utf-8"><title>BREACH smoke test</title></head>
<body>
<pre id="out">RUNNING</pre>
<script src="https://cdn.jsdelivr.net/npm/pathfinding@0.4.18/visual/lib/pathfinding-browser.min.js"></script>
<script type="module">
import { MapData } from './js/map/MapData.js';
import { Operator } from './js/entities/Operator.js';
import { Enemy } from './js/entities/Enemy.js';
import { DetectionSystem } from './js/systems/DetectionSystem.js';
import { AISystem } from './js/systems/AISystem.js';
import { VisionSystem } from './js/systems/VisionSystem.js';
import { DoorSystem } from './js/systems/DoorSystem.js';
import { CombatSystem } from './js/systems/CombatSystem.js';
import { CommandSystem } from './js/systems/CommandSystem.js';
import { Bullet } from './js/entities/Bullet.js';
import { CFG } from './js/core/Config.js';

const out = [];
const ok = (name, cond) => out.push(`${cond ? 'PASS' : 'FAIL'} ${name}`);

try {
  const map = await MapData.load('maps/mission_01.json');

  // konwersje tile<->world
  const w = map.tileToWorld(2, 2);
  ok('tileToWorld center', w.x === 80 && w.y === 80);
  const t = map.worldToTile(81, 95);
  ok('worldToTile', t.col === 2 && t.row === 2);

  // maski: okno (10,2) blokuje ruch, NIE blokuje LOS; ściana (10,1) blokuje oba
  ok('window blocks move', !map.isWalkable(10, 2));
  ok('window passes LOS', !map.blocksLos(10, 2));
  ok('wall blocks move', !map.isWalkable(10, 1));
  ok('wall blocks LOS', map.blocksLos(10, 1));
  ok('floor walkable', map.isWalkable(1, 1));

  // pathfinding: spawn (2,2) -> hala (15,4) — przez przerwę w ścianie col 10
  const a = map.tileToWorld(2, 2);
  const b = map.tileToWorld(15, 4);
  const path = map.findPathWorld(a.x, a.y, b.x, b.y);
  ok('path exists', Array.isArray(path) && path.length > 0);
  ok('path ends at target', path && Math.abs(path[path.length - 1].x - b.x) < 1 && Math.abs(path[path.length - 1].y - b.y) < 1);
  ok('path tiles walkable', path && path.every(p => { const pt = map.worldToTile(p.x, p.y); return map.isWalkable(pt.col, pt.row); }));

  // do pokoju lewy-dolny (3,16) — jedyne wejście (4,13) zamykają drzwi d2,
  // więc ścieżka istnieje dopiero po ich otwarciu (test w sekcji Sprint 4)
  const c = map.tileToWorld(3, 16);
  ok('closed door blocks path into room', map.findPathWorld(a.x, a.y, c.x, c.y) === null);

  // cel na ścianie -> null
  const wallW = map.tileToWorld(10, 1);
  ok('path to wall is null', map.findPathWorld(a.x, a.y, wallW.x, wallW.y) === null);

  // operator idzie po ścieżce i dochodzi do celu
  const op = new Operator(a.x, a.y, 0);
  op.setPath(path);
  for (let i = 0; i < 60 * 30 && op.path.length; i++) op.update(1 / 60);
  ok('operator reaches target', Math.hypot(op.x - b.x, op.y - b.y) < 1);
  ok('operator direction finite', Number.isFinite(op.direction));

  // --- Sprint 2: raycast / LOS po losMask ---
  // promień z (1,1) w prawo trafia w ścianę col 10 (krawędź x=320)
  const rayStart = map.tileToWorld(1, 1);
  const ray = map.castRay(rayStart.x, rayStart.y, 0, 1000);
  ok('castRay hits wall', ray.hit && Math.abs(ray.x - 320) < 0.001 && Math.abs(ray.dist - 272) < 0.001);
  const rayShort = map.castRay(rayStart.x, rayStart.y, 0, 100);
  ok('castRay respects range', !rayShort.hit && Math.abs(rayShort.dist - 100) < 0.001);

  const at = (c, r) => map.tileToWorld(c, r);
  ok('LOS open floor', map.hasLineOfSight(at(2,2).x, at(2,2).y, at(8,2).x, at(8,2).y));
  ok('LOS through window', map.hasLineOfSight(at(20,7).x, at(20,7).y, at(20,9).x, at(20,9).y));
  ok('LOS blocked by wall', !map.hasLineOfSight(at(12,7).x, at(12,7).y, at(12,9).x, at(12,9).y));

  // --- Sprint 2: DetectionSystem ---
  const det = new DetectionSystem({ map });
  const mkEnemy = (c, r, facingRad = 0) =>
    new Enemy({ id: 't', ...at(c, r), type: 'stationary', facingRad });
  const mkOp = (c, r) => new Operator(at(c, r).x, at(c, r).y, 99);

  ok('detect: sees ahead', det.canSee(mkEnemy(15, 4, 0), mkOp(18, 4)));
  ok('detect: not behind (FOV)', !det.canSee(mkEnemy(15, 4, 0), mkOp(12, 4)));
  ok('detect: not beyond range', !det.canSee(mkEnemy(15, 4, 0), mkOp(22, 4)));
  ok('detect: wall blocks', !det.canSee(mkEnemy(12, 7, Math.PI / 2), mkOp(12, 9)));
  ok('detect: window passes', det.canSee(mkEnemy(20, 7, Math.PI / 2), mkOp(20, 9)));

  // wykrycie ustawia ALERT i propaguje do wroga obok (2 kafelki < ALERT_RADIUS_TILES)
  const spotter = mkEnemy(15, 4, 0);
  const buddy = mkEnemy(17, 4, Math.PI); // patrzy w drugą stronę — sam nie widzi
  det.update([spotter, buddy], [mkOp(18, 4)]);
  ok('detect: spotter alerted', spotter.state === 'ALERT' && spotter.lastKnown !== null);
  ok('detect: alert propagates', buddy.state === 'ALERT');

  // --- Sprint 2: AISystem ---
  const ai = new AISystem({ map });
  const patroller = new Enemy({
    id: 'p1', ...at(15, 4), type: 'patrol',
    patrol: [at(15, 4), at(21, 4), at(21, 7)],
  });
  let minDistToWp = Infinity;
  for (let i = 0; i < 60 * 15; i++) {
    ai.update([patroller], 1 / 60);
    patroller.update(1 / 60);
    minDistToWp = Math.min(minDistToWp, Math.hypot(patroller.x - at(21, 4).x, patroller.y - at(21, 4).y));
  }
  ok('AI: patrol reaches waypoint', minDistToWp < 1);
  ok('AI: patrol keeps state', patroller.state === 'PATROL');

  // wartownik: alarm -> idzie do lastKnown -> po cooldownie wraca do home
  const guard = mkEnemy(15, 4, 0);
  det.update([guard], [mkOp(18, 4)]);
  ok('AI: guard alerted', guard.state === 'ALERT');
  for (let i = 0; i < 60 * 3; i++) { // 3 s — dojście do lastKnown w trakcie alarmu
    ai.update([guard], 1 / 60);
    guard.update(1 / 60);
  }
  const nearLk = Math.hypot(guard.x - at(18, 4).x, guard.y - at(18, 4).y) < map.tileSize;
  ok('AI: guard investigates', nearLk);
  for (let i = 0; i < 60 * 7; i++) { // dokończenie cooldownu + powrót
    ai.update([guard], 1 / 60);
    guard.update(1 / 60);
  }
  ok('AI: guard returns home', guard.state === 'IDLE'
    && Math.hypot(guard.x - guard.home.x, guard.y - guard.home.y) < 2
    && Math.abs(guard.direction - guard.home.direction) < 0.01);

  // --- Sprint 3: VisionSystem (LOS + Fog of War) ---
  const vision = new VisionSystem({ map, detection: det });
  const seerAt = (c, r, dir = 0) => { const o = mkOp(c, r); o.direction = dir; return o; };

  // operator w (15,4) patrzy w prawo: przed nim widzi, za sobą tylko "kątem oka"
  const seer = seerAt(15, 4);
  const eAhead = mkEnemy(18, 4);       // 96 px przed — w stożku
  const eBehindFar = mkEnemy(12, 4);   // 96 px za — poza stożkiem i poza kręgiem
  const eBehindClose = mkEnemy(14, 4); // 32 px za — w kręgu bliskim (1.5 kafelka)
  const eTooFar = mkEnemy(22, 4);      // 224 px przed — poza LOS_RANGE
  const vis1 = vision.compute([seer], [eAhead, eBehindFar, eBehindClose, eTooFar]);
  ok('vision: sees ahead', vis1.visibleEnemies.has(eAhead));
  ok('vision: not behind beyond proximity', !vis1.visibleEnemies.has(eBehindFar));
  ok('vision: proximity sees behind', vis1.visibleEnemies.has(eBehindClose));
  ok('vision: not beyond range', !vis1.visibleEnemies.has(eTooFar));

  const visWall = vision.compute([seerAt(12, 7, Math.PI / 2)], [mkEnemy(12, 9)]);
  ok('vision: wall hides enemy', visWall.visibleEnemies.size === 0);
  const visWin = vision.compute([seerAt(20, 7, Math.PI / 2)], [mkEnemy(20, 9)]);
  ok('vision: window reveals enemy', visWin.visibleEnemies.size === 1);

  // wielokąty: stożek + krąg na operatora; promienie ucięte na blokadzie są
  // przedłużane o FOG_REVEAL_PX (odsłonięcie obserwowanej ściany/drzwi z mgły)
  ok('vision: 2 polygons per operator', vis1.polygons.length === 2);
  ok('vision: polygons within range', vis1.polygons.every(poly =>
    poly.every(p => Math.hypot(p.x - seer.x, p.y - seer.y) <= CFG.LOS_RANGE + CFG.FOG_REVEAL_PX + 1e-6)));
  // stożek ucięty na ścianie: operator w (12,7) patrzy w dół, ściana w (12,8) —
  // środkowy promień (dokładnie w dół) trafia w górną krawędź ściany (y=256)
  // i wchodzi FOG_REVEAL_PX w głąb kafelka ściany
  const seerWall = seerAt(12, 7, Math.PI / 2);
  const conePoly = vision.compute([seerWall], []).polygons[0];
  ok('vision: cone has apex + arc', conePoly.length === CFG.LOS_RAYS + 2);
  const midRay = conePoly[1 + CFG.LOS_RAYS / 2]; // [0] = wierzchołek w operatorze
  ok('vision: cone clipped by wall + reveal', Math.abs(midRay.y - (8 * map.tileSize + CFG.FOG_REVEAL_PX)) < 0.001
    && Math.abs(midRay.x - seerWall.x) < 0.001);

  // --- Sprint 4: drzwi + synchronizacja masek/gridu ---
  const d2 = map.doorAt(4, 13);
  ok('door starts closed', d2 !== null && d2.state === 'closed');
  ok('closed door blocks move', !map.isWalkable(4, 13));
  ok('closed door blocks LOS', map.blocksLos(4, 13));

  let dirtyCount = 0;
  const doors = new DoorSystem({ map, detection: det, onDoorChanged: () => dirtyCount++ });

  // OPEN_SLOW z dojściem: operator daleko od drzwi dostaje ścieżkę podejścia,
  // po dojściu otwiera cicho; obie maski + grid PF muszą się zsynchronizować
  const opener = new Operator(at(2, 10).x, at(2, 10).y, 1);
  ok('door order accepted', doors.orderDoorAction(opener, d2, 'OPEN_SLOW') === true);
  ok('door order sets approach path', opener.path.length > 0);
  for (let i = 0; i < 60 * 20 && d2.state === 'closed'; i++) {
    opener.update(1 / 60);
    doors.update([opener], [], 1 / 60);
  }
  ok('OPEN_SLOW opens door', d2.state === 'open');
  ok('open door passes move', map.isWalkable(4, 13));
  ok('open door passes LOS', !map.blocksLos(4, 13));
  ok('door change marks map dirty once', dirtyCount === 1);
  ok('door action cleared', opener.doorAction === null);
  const pathIn = map.findPathWorld(a.x, a.y, c.x, c.y);
  ok('path through open door', Array.isArray(pathIn) && pathIn.length > 0
    && pathIn.every(p => { const pt = map.worldToTile(p.x, p.y); return map.isWalkable(pt.col, pt.row); }));

  // KICK: natychmiast + hałas alarmuje wrogów w promieniu KICK_ALERT_TILES
  // (przez ściany), poza promieniem cisza
  const d1 = map.doorAt(16, 8);
  const kicker = new Operator(at(16, 7).x, at(16, 7).y, 2);
  const nearEnemy = mkEnemy(18, 10, 0); // ~2.8 kafelka od drzwi, za ścianą
  const farEnemy = mkEnemy(2, 16, 0);   // daleko poza promieniem
  ok('kick order accepted', doors.orderDoorAction(kicker, d1, 'KICK') === true);
  ok('kick in place needs no path', kicker.path.length === 0);
  doors.update([kicker], [nearEnemy, farEnemy], 1 / 60);
  ok('KICK opens immediately', d1.state === 'open');
  ok('KICK alerts nearby enemy', nearEnemy.state === 'ALERT' && nearEnemy.lastKnown !== null);
  ok('KICK does not alert far enemy', farEnemy.state !== 'ALERT');
  ok('kicked door passes move', map.isWalkable(16, 8));

  // OPEN_SLOW nie jest natychmiastowe — trwa DOOR_OPEN_SLOW_S (świeża mapa)
  const map2 = await MapData.load('maps/mission_01.json');
  const doors2 = new DoorSystem({ map: map2, detection: new DetectionSystem({ map: map2 }) });
  const dd = map2.doorAt(4, 13);
  const adj = new Operator(map2.tileToWorld(4, 12).x, map2.tileToWorld(4, 12).y, 3);
  doors2.orderDoorAction(adj, dd, 'OPEN_SLOW');
  doors2.update([adj], [], 1 / 60);
  ok('OPEN_SLOW not instant', dd.state === 'closed');
  for (let i = 0; i < Math.ceil(CFG.DOOR_OPEN_SLOW_S * 60) + 2; i++) doors2.update([adj], [], 1 / 60);
  ok('OPEN_SLOW opens after delay', dd.state === 'open');

  // rozkaz na już otwartych drzwiach jest odrzucany
  ok('order on open door rejected', doors2.orderDoorAction(adj, dd, 'KICK') === false);

  // --- Sprint 5: walka (hitscan) ---
  const map5 = await MapData.load('maps/mission_01.json'); // świeże maski (poprzednie testy otworzyły drzwi)
  const det5 = new DetectionSystem({ map: map5 });
  const combat = new CombatSystem({ detection: det5 });
  const at5 = (c, r) => map5.tileToWorld(c, r);
  const mkOp5 = (c, r, dir = 0) => { const o = new Operator(at5(c, r).x, at5(c, r).y, 50 + c); o.direction = dir; return o; };
  const mkEnemy5 = (c, r, dir = 0, armor = 'light') =>
    new Enemy({ id: 'e5', ...at5(c, r), type: 'stationary', facingRad: dir, armor });
  // krok symulacji jak w Game.update: Detection przed Combat
  const step5 = (ops, ens, n) => { for (let i = 0; i < n; i++) { det5.update(ens, ops); combat.update(ops, ens, 1 / 60); } };
  const aimSteps = Math.ceil((CFG.OPERATOR_AIM_S + 0.05) * 60);

  // klasy pancerza wroga -> HP z konfiguracji
  ok('enemy hp per armor class', mkEnemy5(1, 1).hp === CFG.ENEMY_HP.light
    && mkEnemy5(1, 1, 0, 'heavy').hp === CFG.ENEMY_HP.heavy
    && mkEnemy5(1, 1, 0, 'armored').hp === CFG.ENEMY_HP.armored
    && mkEnemy5(1, 1).maxHp === CFG.ENEMY_HP.light);

  // pula tracerów: prealokowana, nic nie lata na starcie
  ok('tracer pool preallocated', combat.tracers.length === CFG.TRACER_POOL
    && combat.tracers.every(t => t instanceof Bullet && !t.active));

  // operator NIE strzela natychmiast — najpierw czas celowania
  const gunner = mkOp5(15, 4, 0);
  const victim = mkEnemy5(18, 4, 0); // patrzy w prawo, nie widzi operatora
  step5([gunner], [victim], 1);
  ok('no shot before aim time', victim.hp === CFG.ENEMY_HP.light);

  // po celowaniu pierwszy strzał: obrażenia + tracer + prowadzenie lufy
  step5([gunner], [victim], aimSteps);
  ok('operator fires after aim time', victim.hp === CFG.ENEMY_HP.light - CFG.OPERATOR_DAMAGE);
  ok('tracer spawned', combat.tracers.some(t => t.active));
  ok('shooter tracks target', Math.abs(gunner.direction) < 0.01);

  // drugi strzał po kadencji zabija light (2 x 34 > 50); trup zwalnia cel
  step5([gunner], [victim], 60);
  ok('enemy dies after second hit', victim.alive === false && victim.hp === 0);
  ok('dead target released', gunner.combatTarget === null);
  ok('tracers expire', combat.tracers.every(t => !t.active));

  // hałas wystrzału: wróg za ścianą w promieniu SHOT_ALERT_TILES słyszy strzał
  const sniper = mkOp5(15, 4, 0);
  const prey = mkEnemy5(18, 4, 0);
  const listener = mkEnemy5(13, 10, 0); // ~6.3 kafelka od strzelca, za ścianą (wiersz 8)
  step5([sniper], [prey, listener], aimSteps);
  ok('gunshot alerts enemy through wall', listener.state === 'ALERT'
    && listener.lastKnown !== null
    && Math.hypot(listener.lastKnown.x - sniper.x, listener.lastKnown.y - sniper.y) < 1);

  // friendly fire: sojusznik na linii strzału przejmuje trafienie
  const ff = mkOp5(15, 4, 0);
  const blocker = mkOp5(16, 4, Math.PI); // na linii, patrzy w drugą stronę (sam nie strzela)
  const foe = mkEnemy5(18, 4, 0);
  step5([ff, blocker], [foe], aimSteps);
  ok('friendly in line takes the hit', blocker.hp === CFG.OPERATOR_HP - CFG.OPERATOR_DAMAGE);
  ok('target behind friendly unharmed', foe.hp === CFG.ENEMY_HP.light);

  // pocisk przechodzi przez okno (20,8), ściana (12,8) blokuje walkę w ogóle
  const winGunner = mkOp5(20, 7, Math.PI / 2);
  const winVictim = mkEnemy5(20, 9, Math.PI / 2); // patrzy w dół, nie odpowiada ogniem
  step5([winGunner], [winVictim], aimSteps);
  ok('shot passes window', winVictim.hp < CFG.ENEMY_HP.light);
  const wallGunner = mkOp5(12, 7, Math.PI / 2);
  const wallSafe = mkEnemy5(12, 9, Math.PI / 2);
  step5([wallGunner], [wallSafe], 60);
  ok('wall prevents engagement', wallSafe.hp === CFG.ENEMY_HP.light && wallGunner.combatTarget === null);

  // wróg odpowiada ogniem po ENEMY_AIM_S; śmierć operatora czyści
  // zaznaczenie i ścieżkę (trup nie przyjmuje rozkazów)
  const mark = mkOp5(15, 4, Math.PI); // plecami do wroga — sam nie strzela
  mark.selected = true;
  const hunter = mkEnemy5(18, 4, Math.PI, 'heavy');
  const shotsToKill = Math.ceil(CFG.OPERATOR_HP / CFG.ENEMY_DAMAGE);
  step5([mark], [hunter], Math.ceil((CFG.ENEMY_AIM_S + shotsToKill * CFG.ENEMY_FIRE_COOLDOWN_S + 0.5) * 60));
  ok('enemy return fire kills operator', mark.alive === false && mark.hp === 0);
  ok('dead operator deselected', mark.selected === false && mark.path.length === 0);

  // --- Sprint 6: rozkazy na ścieżce (CommandSystem) ---
  const map6 = await MapData.load('maps/mission_01.json'); // świeże drzwi
  const det6 = new DetectionSystem({ map: map6 });
  const doors6 = new DoorSystem({ map: map6, detection: det6 });
  const cmd = new CommandSystem({ map: map6, doorSystem: doors6 });
  const at6 = (c, r) => map6.tileToWorld(c, r);
  // krok jak w Game.update: Movement -> Command -> DoorSystem
  const run6 = (op, n) => { for (let i = 0; i < n; i++) { op.update(1 / 60); cmd.update([op], 1 / 60); doors6.update([op], [], 1 / 60); } };

  // kolejka dwóch MOVE (append) — operator odwiedza punkty po kolei
  const runner = new Operator(at6(2, 2).x, at6(2, 2).y, 60);
  cmd.queueMove(runner, at6(5, 2).x, at6(5, 2).y, false);
  cmd.queueMove(runner, at6(5, 5).x, at6(5, 5).y, true);
  ok('queue holds two nodes', runner.orders.length === 2 && runner.orders.every(n => n.type === 'MOVE'));
  ok('queued move has preview path', Array.isArray(runner.orders[0].preview) && runner.orders[0].preview.length > 0);
  run6(runner, 60 * 8);
  ok('queued moves executed in order', runner.orders.length === 0
    && Math.hypot(runner.x - at6(5, 5).x, runner.y - at6(5, 5).y) < 1);

  // rozkaz bez append zastępuje całą kolejkę
  cmd.queueMove(runner, at6(2, 2).x, at6(2, 2).y, true);
  cmd.queueMove(runner, at6(8, 2).x, at6(8, 2).y, true);
  cmd.queueMove(runner, at6(5, 2).x, at6(5, 2).y, false);
  ok('replace clears queue', runner.orders.length === 1);
  cmd.clearOrders(runner);

  // STOP wstrzymuje plan do sygnału GO (go-code)
  const holder = new Operator(at6(2, 2).x, at6(2, 2).y, 61);
  cmd.queueMove(holder, at6(5, 2).x, at6(5, 2).y, false);
  cmd.queueStop(holder);
  cmd.queueMove(holder, at6(8, 2).x, at6(8, 2).y, true);
  run6(holder, 60 * 4);
  ok('STOP holds at waypoint', holder.orders.length === 2 && holder.orders[0].type === 'STOP'
    && Math.hypot(holder.x - at6(5, 2).x, holder.y - at6(5, 2).y) < 1);
  cmd.go();
  run6(holder, 60 * 4);
  ok('GO releases STOP', holder.orders.length === 0
    && Math.hypot(holder.x - at6(8, 2).x, holder.y - at6(8, 2).y) < 1);

  // WATCH obraca operatora ku wskazanemu punktowi
  const watcher = new Operator(at6(2, 2).x, at6(2, 2).y, 62);
  watcher.direction = 0;
  cmd.queueWatch(watcher, at6(2, 5).x, at6(2, 5).y); // punkt dokładnie pod nim
  run6(watcher, 60);
  ok('WATCH turns operator', watcher.orders.length === 0 && Math.abs(watcher.direction - Math.PI / 2) < 0.01);

  // węzeł DOOR + MOVE za drzwi: ścieżka MOVE liczona przy AKTYWACJI,
  // po otwarciu drzwi — w chwili planowania cel jest nieosiągalny
  const breacher = new Operator(at6(2, 10).x, at6(2, 10).y, 63);
  const d6 = map6.doorAt(4, 13);
  ok('room unreachable while door closed',
    map6.findPathWorld(breacher.x, breacher.y, at6(2, 15).x, at6(2, 15).y) === null);
  cmd.queueDoor(breacher, d6, 'OPEN_SLOW', false);
  cmd.queueMove(breacher, at6(2, 15).x, at6(2, 15).y, true);
  run6(breacher, 60 * 15);
  ok('DOOR node opens door', d6.state === 'open');
  ok('queued move passes opened door', breacher.orders.length === 0
    && Math.hypot(breacher.x - at6(2, 15).x, breacher.y - at6(2, 15).y) < 1);

  // trup nie wykonuje planu
  const casualty = new Operator(at6(2, 2).x, at6(2, 2).y, 64);
  cmd.queueMove(casualty, at6(5, 2).x, at6(5, 2).y, false);
  casualty.alive = false;
  cmd.update([casualty], 1 / 60);
  ok('dead operator drops orders', casualty.orders.length === 0);

  const fails = out.filter(l => l.startsWith('FAIL')).length;
  out.push(fails === 0 ? 'ALL-PASS' : `FAILURES: ${fails}`);
} catch (err) {
  out.push('EXCEPTION: ' + err.message);
}
document.getElementById('out').textContent = out.join('\n');
</script>
</body>
</html>
